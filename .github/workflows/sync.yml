name: Scoop Buckets Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
jobs:
  sync:
    # runs-on: ubuntu-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v3
        with:
          node-version: latest
          cache: 'npm'
      - name: Sync buckets
        run: |
          copy .github/package.json .
          npm i --no-package-lock --no-audit --no-fund
          node .github/sync.mjs
        env:
          SYNC: 1
